<html lang="zh-Hant">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%BA%3C/text%3E%3C/svg%3E">
<style>
  :root{ --bg:#f6faf1; --bg2:#ffffff; --bg3:#eaf4e3; --tint:#f0f8ec; --ink:#17321f; --mute:#5d7064; --line:#dbe8d2; --green:#06c755; --green-d:#0a8f43; --gold:#f5b400; --gold-d:#9a6b00; --navy:#1a2547; --coral:#ef6a48; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Noto Sans TC',system-ui,'PingFang TC','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100%;}
  button{font-family:inherit;cursor:pointer;}
  .stripe{height:8px;background:repeating-linear-gradient(90deg,var(--green) 0 22px,var(--gold) 22px 44px);}
  header{position:sticky;top:0;z-index:20;background:rgba(246,250,241,.96);backdrop-filter:blur(8px);border-bottom:3px solid var(--green);}
  .bar{max-width:1320px;margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .bar .ttl{font-weight:900;font-size:1.05rem;color:var(--green-d);display:flex;align-items:center;gap:8px;}
  .bar .ttl small{color:var(--mute);font-weight:700;font-size:.72rem;}
  .bar .stat{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font-weight:800;font-size:.85rem;}
  .chip b{color:var(--green-d);}
  .btn{border:0;border-radius:10px;font-weight:900;padding:9px 15px;font-size:.9rem;}
  .btn-p{background:var(--green);color:#fff;} .btn-p:hover{background:var(--green-d);}
  .btn-g{background:var(--bg2);color:var(--ink);border:1px solid var(--line);} .btn-g:hover{border-color:var(--green);color:var(--green-d);}
  .wrap{max-width:1320px;margin:0 auto;padding:20px 18px 60px;}
  .hint{color:var(--mute);font-size:.9rem;margin:0 0 16px;} .hint kbd{background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-family:monospace;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .gcard{background:var(--bg2);border:1px solid var(--line);border-top:4px solid var(--green);border-radius:16px;padding:14px;cursor:pointer;transition:transform .12s,border-color .12s;position:relative;}
  .gcard:hover{transform:translateY(-3px);border-top-color:var(--gold);}
  .gcard .code{font-weight:900;font-size:1.5rem;color:var(--navy);}
  .gcard .code b{color:var(--green-d);}
  .gcard .nm{font-weight:800;font-size:.95rem;color:var(--ink);margin:2px 0 8px;word-break:break-all;}
  .gcard .mini{display:flex;gap:5px;margin-bottom:8px;}
  .gcard .mini .m{flex:1;aspect-ratio:1;border-radius:8px;overflow:hidden;background:var(--bg3);border:1px solid var(--line);position:relative;}
  .gcard .mini .m img{width:100%;height:100%;object-fit:cover;}
  .gcard .mini .m .ph{position:absolute;inset:0;display:grid;place-items:center;font-size:1.3rem;color:#c4d4bd;}
  .gcard .mini .m .n{position:absolute;bottom:3px;right:4px;background:rgba(0,0,0,.6);color:#fff;font-size:.62rem;font-weight:800;padding:0 5px;border-radius:6px;}
  .gcard .meta{color:var(--mute);font-size:.78rem;}
  .gcard.want{border-top-color:var(--gold);box-shadow:0 0 0 2px rgba(245,180,0,.55) inset;}
  .gcard .wantbadge{display:inline-block;margin-bottom:6px;font-size:.66rem;font-weight:900;color:#3a2800;background:var(--gold);padding:2px 9px;border-radius:999px;}
  .gcard.done{opacity:.7;} .gcard.done::after{content:'已發表';position:absolute;top:12px;right:12px;font-size:.64rem;font-weight:900;color:#fff;background:var(--mute);padding:2px 8px;border-radius:999px;}
  .empty{text-align:center;color:var(--mute);padding:60px 20px;} .empty .big{font-size:1.3rem;color:var(--ink);font-weight:800;margin-bottom:8px;}

  /* stage */
  .stage{position:fixed;inset:0;z-index:40;background:var(--bg);display:none;flex-direction:column;}
  .stage.show{display:flex;}
  .shead{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:2px solid var(--line);flex-wrap:wrap;}
  .shead .scode{font-weight:900;font-size:clamp(1.6rem,4vw,2.6rem);color:var(--navy);} .shead .scode b{color:var(--green-d);}
  .shead .sname{font-weight:900;font-size:clamp(1.1rem,2.4vw,1.7rem);}
  .shead .smeta{color:var(--mute);font-size:.9rem;}
  .shead .sctrl{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;}
  .sbody{flex:1;overflow:auto;padding:22px 28px;}
  .sect{margin-bottom:26px;}
  .sect h3{margin:0 0 4px;color:var(--navy);font-size:1.25rem;display:flex;align-items:center;gap:10px;}
  .sect h3 .bdg{width:30px;height:30px;border-radius:9px;background:var(--bg3);color:var(--green-d);display:grid;place-items:center;font-weight:900;}
  .sect .note{color:var(--mute);margin:0 0 12px;font-size:1.05rem;}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
  .gallery img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;border:1px solid var(--line);cursor:zoom-in;background:var(--bg3);}
  .gallery .none{color:var(--mute);font-style:italic;grid-column:1/-1;}

  .reveal{position:fixed;inset:0;z-index:60;background:rgba(246,250,241,.95);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
  .reveal.show{display:flex;}
  .reveal .lab{color:var(--gold-d);font-weight:900;letter-spacing:.18em;}
  .reveal .rcode{font-weight:900;font-size:clamp(4rem,20vw,13rem);color:var(--navy);text-shadow:3px 3px 0 rgba(6,199,85,.3);}
  .reveal .rcode b{color:var(--green-d);}
  .reveal .rname{font-weight:900;font-size:clamp(1.2rem,4vw,2.2rem);color:var(--green-d);min-height:1.2em;}

  .lb{position:fixed;inset:0;z-index:80;background:rgba(15,30,18,.9);display:none;align-items:center;justify-content:center;padding:18px;}
  .lb.show{display:flex;} .lb img{max-width:96vw;max-height:92vh;border-radius:10px;} .lb .x{position:absolute;top:16px;right:20px;background:#fff;border:0;border-radius:999px;width:42px;height:42px;font-size:20px;font-weight:900;}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(40px);z-index:90;background:var(--navy);color:#fff;font-weight:800;padding:12px 20px;border-radius:12px;opacity:0;transition:.25s;pointer-events:none;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .lboard{background:var(--bg2);border:1px solid var(--line);border-top:4px solid var(--gold);border-radius:16px;padding:14px 16px;margin-bottom:16px;}
  .lboard h4{margin:0 0 10px;color:var(--navy);font-size:1.05rem;display:flex;align-items:center;gap:8px;}
  .lboard .rows{display:grid;gap:6px;}
  .lboard .lrow{display:flex;align-items:center;gap:12px;padding:8px 13px;border-radius:10px;background:var(--bg3);}
  .lboard .lrow .rk{font-weight:900;color:var(--mute);min-width:30px;font-size:1.05rem;}
  .lboard .lrow.top1{background:linear-gradient(90deg,rgba(245,180,0,.28),var(--bg3));}
  .lboard .lrow .gc{font-weight:900;color:var(--navy);} .lboard .lrow .gn{color:var(--mute);font-size:.85rem;}
  .lboard .lrow .pts{margin-left:auto;font-weight:900;color:var(--green-d);font-size:1.15rem;white-space:nowrap;} .lboard .lrow .pts small{color:var(--mute);font-weight:700;font-size:.7rem;}
  .gcard .code .score{font-size:.78rem;font-weight:900;color:var(--green-d);background:var(--bg3);border:1px solid var(--line);border-radius:999px;padding:2px 9px;margin-left:6px;white-space:nowrap;}
  :root[data-theme="dark"]{ --bg:#141b2e; --bg2:#1d2740; --bg3:#28344f; --tint:#1d2740; --ink:#eef2ff; --mute:#9fb0d8; --line:#33405e; --navy:#eef2ff; }
  :root[data-theme="dark"] header{background:rgba(20,27,46,.96);}
  :root[data-theme="dark"] .reveal{background:rgba(20,27,46,.95);}
  :root[data-theme="dark"] .gcard .code,:root[data-theme="dark"] .reveal .rcode,:root[data-theme="dark"] .shead .scode{color:#ffd24a;}
  :root[data-theme="dark"] .gcard .code b,:root[data-theme="dark"] .shead .scode b,:root[data-theme="dark"] .reveal .rcode b{color:var(--green);}
</style>
</head>
<body>
<div class="stripe"></div>
<header><div class="bar">
  <span class="ttl">📺 講師展示台 <small>AI × LINE 餐飲即戰力 · 分組版</small></span>
  <div class="stat">
    <span class="chip">組數 <b id="cTotal">0</b></span>
    <span class="chip" style="border-color:var(--gold)">🙋 想上台 <b id="cWant" style="color:var(--gold-d)">0</b></span>
    <span class="chip">已發表 <b id="cDone">0</b></span>
    <button class="btn btn-g" id="btnScore">🏆 分數榜</button>
    <span class="chip" id="cUpd">—</span>
    <button class="btn btn-g" id="btnReload">↻ 整理</button>
    <button class="btn btn-g" id="btnTheme">🌓 深色</button>
    <button class="btn btn-g" id="btnFs">⛶ 全螢幕</button>
    <button class="btn btn-p" id="btnRandom">🎲 隨機抽組</button>
  </div>
</div></header>
<div class="wrap">
  <p class="hint">🙋 <b style="color:var(--gold-d)">想上台的組會變金框置頂</b>。卡片右上是<b>本組小考總分</b>（個人加總）。點任一組放大看 3 格成果；<kbd>R</kbd> 隨機抽 · <kbd>←</kbd>/<kbd>→</kbd> 上下組 · <kbd>D</kbd> 標記已發表 · <kbd>Esc</kbd> 返回。每 15 秒自動同步。</p>
  <div id="board" class="lboard" style="display:none"></div>
  <div id="grid" class="grid"></div>
  <div id="empty" class="empty" style="display:none"><div class="big">還沒有組別上傳成果</div><div>各組在「提案」分頁上傳照片後，這裡就會即時出現。</div></div>
</div>

<div class="stage" id="stage">
  <div class="shead">
    <span class="scode" id="sCode">—</span><span class="sname" id="sName"></span><span class="smeta" id="sMeta"></span>
    <div class="sctrl">
      <button class="btn btn-g" id="sPrev">← 上一組</button>
      <button class="btn btn-g" id="sNext">下一組 →</button>
      <button class="btn btn-g" id="sDone">✓ 標記已發表</button>
      <button class="btn btn-p" id="sRandom">🎲 再抽</button>
      <button class="btn btn-g" id="sBack">✕ 返回</button>
    </div>
  </div>
  <div class="sbody" id="sBody"></div>
</div>

<div class="reveal" id="reveal"><div class="lab">◆ 抽中的是 ◆</div><div class="rcode" id="rCode">—</div><div class="rname" id="rName"></div></div>
<div class="lb" id="lb"><button class="x" id="lbX">✕</button><img id="lbImg" alt="放大"></div>
<div id="toast"></div>

<script>
  var SUPA_URL='https://dpglkagtzdwiovzbtase.supabase.co';
  var SUPA_KEY='sb_publishable_Tuj9p4DXvO-jEqVcBnumTg_TqZ1NnRu';
  var COURSE='ai-line-member-team';
  var DONE_STORE='lwteam_board_done_v1';
  var ITEMS=[['①','活動主題'],['②','行銷內容'],['③','獲利估算']];
  var rows=[], doneSet=loadDone(), curIdx=-1, scoreMap={};
  function loadDone(){ try{return new Set(JSON.parse(localStorage.getItem(DONE_STORE)||'[]'));}catch(e){return new Set();} }
  function saveDone(){ try{localStorage.setItem(DONE_STORE,JSON.stringify(Array.from(doneSet)));}catch(e){} }
  var toastT; function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2200);}
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c];});}
  function fmtTime(s){try{return new Date(s).toLocaleString('zh-TW',{hour12:false,month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
  function urls(r,i){ var k=['item1_urls','item2_urls','item3_urls'][i]; var a=r[k]; return Array.isArray(a)?a:[]; }
  function photoCount(r){ return urls(r,0).length+urls(r,1).length+urls(r,2).length; }
  function notes(r){ try{var n=JSON.parse(r.note||'[]'); return Array.isArray(n)?n:['','',''];}catch(e){return ['','',''];} }

  async function fetchRows(){
    var url=SUPA_URL+'/rest/v1/lw_team_submissions?course=eq.'+encodeURIComponent(COURSE)+'&select=*&order=updated_at.desc';
    var res=await fetch(url,{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    var data=await res.json();
    data.sort(function(a,b){
      var aw=a.wants_stage?0:1,bw=b.wants_stage?0:1; if(aw!==bw)return aw-bw;
      if(a.wants_stage&&b.wants_stage)return new Date(a.wants_stage_at||0)-new Date(b.wants_stage_at||0);
      return String(a.code).localeCompare(String(b.code));
    });
    return data;
  }
  function render(){
    var grid=document.getElementById('grid'), empty=document.getElementById('empty');
    document.getElementById('cTotal').textContent=rows.length;
    document.getElementById('cDone').textContent=rows.filter(function(r){return doneSet.has(r.code);}).length;
    document.getElementById('cWant').textContent=rows.filter(function(r){return r.wants_stage;}).length;
    if(!rows.length){ grid.innerHTML=''; empty.style.display='block'; return; }
    empty.style.display='none';
    grid.innerHTML=rows.map(function(r){
      var done=doneSet.has(r.code), want=!!r.wants_stage, n=photoCount(r);
      var mini=[0,1,2].map(function(i){ var a=urls(r,i); var first=a[0]&&a[0].url;
        return '<div class="m">'+(first?'<img src="'+esc(first)+'">':'<div class="ph">'+ITEMS[i][0]+'</div>')+(a.length?'<span class="n">'+a.length+'</span>':'')+'</div>';
      }).join('');
      var sc=scoreMap[r.code];
      return '<div class="gcard'+(done?' done':'')+(want?' want':'')+'" data-code="'+esc(r.code)+'">'+
        (want?'<span class="wantbadge">🙋 想上台</span>':'')+
        '<div class="code"><b>'+esc(r.code)+'</b> 組'+(sc?'<span class="score">🏆 '+sc.total+' 分</span>':'')+'</div>'+
        '<div class="nm">'+esc(r.name||'（未填組名）')+'</div>'+
        '<div class="mini">'+mini+'</div>'+
        '<div class="meta">'+n+' 張照片 · '+fmtTime(r.updated_at)+(want?' · 🙋'+fmtTime(r.wants_stage_at):'')+'</div>'+
      '</div>';
    }).join('');
    renderBoard();
  }
  function renderBoard(){
    var el=document.getElementById('board'); if(!el) return;
    var codes=Object.keys(scoreMap);
    if(!codes.length){ el.innerHTML='<h4>🏆 各組小考總分（個人分加總）</h4><div style="color:var(--mute)">還沒有人作答計分。學員到「小考」答題後就會出現。</div>'; return; }
    codes.sort(function(a,b){return scoreMap[b].total-scoreMap[a].total || a.localeCompare(b);});
    var nameOf={}; rows.forEach(function(r){nameOf[r.code]=r.name||'';});
    el.innerHTML='<h4>🏆 各組小考總分（個人分加總）</h4><div class="rows">'+codes.map(function(c,i){
      var s=scoreMap[c], rk=(i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.');
      return '<div class="lrow'+(i===0?' top1':'')+'"><span class="rk">'+rk+'</span><span class="gc">'+esc(c)+' 組</span>'+(nameOf[c]?'<span class="gn">'+esc(nameOf[c])+'</span>':'')+'<span class="pts">'+s.total+' <small>分・'+s.members+' 人</small></span></div>';
    }).join('')+'</div>';
  }
  async function fetchScores(){
    try{
      var res=await fetch(SUPA_URL+'/rest/v1/lw_team_scores?course=eq.'+encodeURIComponent(COURSE)+'&select=code,name,score',{headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
      if(!res.ok) return;
      var arr=await res.json(); var m={};
      arr.forEach(function(r){ var c=r.code; if(!m[c]) m[c]={total:0,members:0}; m[c].total+=(+r.score||0); m[c].members++; });
      scoreMap=m;
    }catch(e){}
  }
  function idxOf(code){ for(var i=0;i<rows.length;i++) if(rows[i].code===code) return i; return -1; }
  function openStage(code){
    var i=idxOf(code); if(i<0)return; curIdx=i; var r=rows[i]; var nt=notes(r);
    document.getElementById('sCode').innerHTML='<b>'+esc(r.code)+'</b> 組';
    document.getElementById('sName').textContent=r.name||'（未填組名）';
    var sc=scoreMap[r.code];
    document.getElementById('sMeta').textContent=(sc?'🏆 '+sc.total+' 分（'+sc.members+' 人）· ':'')+photoCount(r)+' 張 · 更新 '+fmtTime(r.updated_at)+(r.wants_stage?' · 🙋 想上台 '+fmtTime(r.wants_stage_at):'')+(doneSet.has(r.code)?' · ✓ 已發表':'');
    var body=ITEMS.map(function(it,idx){
      var a=urls(r,idx);
      var gal=a.length?a.map(function(o){return '<img src="'+esc(o.url)+'" data-zoom="'+esc(o.url)+'" alt="成果照片">';}).join('')
        :'<div class="none">（這組尚未上傳此項）</div>';
      return '<div class="sect"><h3><span class="bdg">'+it[0]+'</span>'+it[1]+'</h3>'+(nt[idx]?'<p class="note">'+esc(nt[idx])+'</p>':'')+'<div class="gallery">'+gal+'</div></div>';
    }).join('');
    document.getElementById('sBody').innerHTML=body;
    document.getElementById('sBody').scrollTop=0;
    document.getElementById('stage').classList.add('show');
    if(window.gtag) gtag('event','board_show',{code:r.code});
  }
  function closeStage(){ document.getElementById('stage').classList.remove('show'); curIdx=-1; }
  function step(d){ if(!rows.length)return; if(curIdx<0){openStage(rows[0].code);return;} openStage(rows[(curIdx+d+rows.length)%rows.length].code); }
  function markDone(){ if(curIdx<0)return; var c=rows[curIdx].code; if(doneSet.has(c)){doneSet.delete(c);toast('已取消「'+c+'組」發表標記');}else{doneSet.add(c);toast('✓ 已標記「'+c+'組」發表');} saveDone(); render(); var r=rows[curIdx]; var sc=scoreMap[c]; document.getElementById('sMeta').textContent=(sc?'🏆 '+sc.total+' 分（'+sc.members+' 人）· ':'')+photoCount(r)+' 張 · 更新 '+fmtTime(r.updated_at)+(r.wants_stage?' · 🙋 想上台 '+fmtTime(r.wants_stage_at):'')+(doneSet.has(c)?' · ✓ 已發表':''); }
  function randomPick(){
    if(!rows.length){toast('還沒有組別上傳');return;}
    var pool=rows.filter(function(r){return !doneSet.has(r.code);}); if(!pool.length)pool=rows.slice();
    var pick=pool[Math.floor(Math.random()*pool.length)];
    var rv=document.getElementById('reveal'),rc=document.getElementById('rCode'),rn=document.getElementById('rName');
    rn.textContent=''; rv.classList.add('show'); var spins=0,max=16+Math.floor(Math.random()*8);
    var t=setInterval(function(){ var x=rows[Math.floor(Math.random()*rows.length)]; rc.innerHTML='<b>'+esc(x.code)+'</b> 組'; spins++;
      if(spins>=max){ clearInterval(t); rc.innerHTML='<b>'+esc(pick.code)+'</b> 組'; rn.textContent=pick.name||''; if(window.gtag)gtag('event','board_random',{code:pick.code}); setTimeout(function(){rv.classList.remove('show');openStage(pick.code);},1100); }
    },70);
  }
  async function reload(silent){ try{ await fetchScores(); rows=await fetchRows(); render(); document.getElementById('cUpd').textContent='更新 '+new Date().toLocaleTimeString('zh-TW',{hour12:false}); if(!silent)toast('已同步 '+rows.length+' 組'); }catch(e){ if(!silent)toast('讀取失敗：'+e.message); } }
  function toggleFs(){ if(!document.fullscreenElement){(document.documentElement.requestFullscreen||function(){})();}else{(document.exitFullscreen||function(){})();} }
  function setTheme(t){ if(t!=='dark')t='light'; document.documentElement.setAttribute('data-theme',t); try{localStorage.setItem('lwteam_board_theme',t);}catch(e){} var b=document.getElementById('btnTheme'); if(b)b.textContent=(t==='dark'?'☀️ 白底':'🌓 深色'); }
  function openLb(u){document.getElementById('lbImg').src=u;document.getElementById('lb').classList.add('show');}
  function closeLb(){document.getElementById('lb').classList.remove('show');}

  document.getElementById('grid').addEventListener('click',function(e){var c=e.target.closest('.gcard');if(c)openStage(c.getAttribute('data-code'));});
  document.getElementById('sBody').addEventListener('click',function(e){var z=e.target.closest('[data-zoom]');if(z)openLb(z.getAttribute('data-zoom'));});
  document.getElementById('btnReload').addEventListener('click',function(){reload(false);});
  document.getElementById('btnScore').addEventListener('click',function(){var el=document.getElementById('board');var show=el.style.display==='none';el.style.display=show?'block':'none';this.classList.toggle('btn-p',show);if(show){renderBoard();el.scrollIntoView({behavior:'smooth',block:'nearest'});}});
  document.getElementById('btnRandom').addEventListener('click',randomPick);
  document.getElementById('btnFs').addEventListener('click',toggleFs);
  document.getElementById('btnTheme').addEventListener('click',function(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');});
  document.getElementById('sBack').addEventListener('click',closeStage);
  document.getElementById('sPrev').addEventListener('click',function(){step(-1);});
  document.getElementById('sNext').addEventListener('click',function(){step(1);});
  document.getElementById('sDone').addEventListener('click',markDone);
  document.getElementById('sRandom').addEventListener('click',randomPick);
  document.getElementById('lbX').addEventListener('click',closeLb);
  document.getElementById('lb').addEventListener('click',function(e){if(e.target.id==='lb')closeLb();});
  document.addEventListener('keydown',function(e){
    if(document.getElementById('lb').classList.contains('show')){ if(e.key==='Escape')closeLb(); return; }
    if(e.key==='Escape'){ if(!document.getElementById('reveal').classList.contains('show'))closeStage(); }
    else if(e.key==='r'||e.key==='R')randomPick();
    else if(e.key==='ArrowRight'){if(document.getElementById('stage').classList.contains('show'))step(1);}
    else if(e.key==='ArrowLeft'){if(document.getElementById('stage').classList.contains('show'))step(-1);}
    else if(e.key==='d'||e.key==='D'){if(document.getElementById('stage').classList.contains('show'))markDone();}
  });
  (function(){var t='light';try{t=localStorage.getItem('lwteam_board_theme')||'light';}catch(e){}setTheme(t);})();
  reload(false); setInterval(function(){reload(true);},15000);
</script>
</body>
</html>
